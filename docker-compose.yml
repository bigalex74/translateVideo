version: '3.8'

services:
  video-translator:
    build: .
    container_name: video-translator
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./runs:/app/runs
    env_file:
      - .env            # ключи облачных rewriter-провайдеров (Gemini, OR, AIHubMix...)
    environment:
      - WORK_ROOT=/app/runs
