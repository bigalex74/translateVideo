version: '3.8'

services:
  video-translator:
    build: .
    container_name: video-translator
    restart: unless-stopped
    network_mode: host        # прямой доступ к хост-сервисам (мост :5000, прокси :10808)
    volumes:
      - ./runs:/app/runs
    env_file:
      - .env            # ключи облачных rewriter-провайдеров (Gemini, OR, AIHubMix...)
    environment:
      - WORK_ROOT=/app/runs
