<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Профессиональный перевод видео с AI-дублированием. Транскрипция, перевод, синтез речи — всё в одном приложении." />
    <meta name="theme-color" content="#6366f1" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Apple PWA (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VideoTranslator" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- Open Graph -->
    <meta property="og:title" content="AI Video Translator" />
    <meta property="og:description" content="Профессиональный перевод видео с AI-дублированием" />
    <meta property="og:type" content="website" />
    <title>AI Video Translator</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- PWA Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then((reg) => {
              console.info('[SW] registered, scope:', reg.scope);
            })
            .catch((err) => {
              console.warn('[SW] registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
